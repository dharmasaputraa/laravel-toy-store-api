services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env.prod
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://rustfs:9000
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    env_file:
      - .env.prod
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      AWS_ENDPOINT: http://rustfs:9000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - laravel
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f horizon || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    networks:
      - laravel
